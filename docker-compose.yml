services:
  mysql:
    image: mysql:8.0
    container_name: solare-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: solare_db
      MYSQL_USER: solare
      MYSQL_PASSWORD: solare
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - solare_mysql_data:/var/lib/mysql

volumes:
  solare_mysql_data:
