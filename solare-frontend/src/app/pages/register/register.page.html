<div class="mx-auto max-w-md px-4 py-10">
  <h1 class="text-2xl font-bold">Registro</h1>
  <form class="mt-6 space-y-4" [formGroup]="form" (ngSubmit)="submit()">
    <div class="grid gap-4 sm:grid-cols-2">
      <div>
        <label class="block text-sm font-medium">Nombre</label>
        <input
          formControlName="firstName"
          class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-600 dark:bg-slate-800"
        />
      </div>
      <div>
        <label class="block text-sm font-medium">Apellido</label>
        <input
          formControlName="lastName"
          class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-600 dark:bg-slate-800"
        />
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium">Correo</label>
      <input
        type="email"
        formControlName="email"
        class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-600 dark:bg-slate-800"
      />
    </div>
    <div>
      <label class="block text-sm font-medium">Contraseña (mín. 8)</label>
      <input
        type="password"
        formControlName="password"
        class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-600 dark:bg-slate-800"
      />
    </div>
    @if (error()) {
      <p class="text-sm text-red-600">{{ error() }}</p>
    }
    <button
      type="submit"
      [disabled]="busy() || form.invalid"
      class="w-full rounded-xl bg-[#FFF52D] py-3 font-semibold text-black disabled:opacity-50"
    >
      {{ busy() ? 'Creando…' : 'Registrarme' }}
    </button>
  </form>
  <p class="mt-4 text-sm">
    ¿Ya tienes cuenta?
    <a routerLink="/login" class="font-medium text-amber-700 underline dark:text-amber-400">Inicia sesión</a>
  </p>
</div>
