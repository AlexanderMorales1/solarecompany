<div class="mx-auto max-w-md px-4 py-10">
  <h1 class="text-2xl font-bold">Nueva contraseña</h1>
  <form class="mt-6 space-y-4" [formGroup]="form" (ngSubmit)="submit()">
    <div>
      <label class="block text-sm font-medium">Token</label>
      <input
        formControlName="token"
        class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-600 dark:bg-slate-800"
      />
    </div>
    <div>
      <label class="block text-sm font-medium">Nueva contraseña</label>
      <input
        type="password"
        formControlName="newPassword"
        class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-600 dark:bg-slate-800"
      />
    </div>
    @if (error()) {
      <p class="text-sm text-red-600">{{ error() }}</p>
    }
    <button
      type="submit"
      [disabled]="busy() || form.invalid"
      class="w-full rounded-xl bg-[#FFF52D] py-3 font-semibold text-black disabled:opacity-50"
    >
      Guardar
    </button>
  </form>
  <a routerLink="/login" class="mt-4 inline-block text-sm text-amber-700 underline">Volver</a>
</div>
